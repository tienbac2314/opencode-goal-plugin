name: Feature request
description: Suggest an improvement for the OpenCode goal plugin
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve? What are you trying to do that the plugin makes hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Include example `/goal` commands, options, or tool behavior if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps — links, screenshots, related issues.
